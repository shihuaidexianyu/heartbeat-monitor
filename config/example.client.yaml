server:
  # Server 的 API 地址
  base_url: "http://127.0.0.1:9999"
  # 本机的唯一标识名
  server_id: "lab-node-01"
  # 首次注册时使用的统一凭证，与 server.yaml 中的 enrollment_token 一致
  enrollment_token: "CHANGE_ME_TO_MATCH_SERVER"
  # 注册后 Server 会返回 node_token，填入此处后 enrollment_token 不再使用
  node_token: null
  heartbeat_interval_sec: 30

agent:
  # 任务运行时 stdout/stderr 的本地日志目录
  log_dir: "./logs/hb-agent"
  # 断网时缓存事件（heartbeat / task_finish）的目录
  spool_dir: "./spool"
  # 默认任务超时时间（秒）
  default_timeout_sec: 7200
