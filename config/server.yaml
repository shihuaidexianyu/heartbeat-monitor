listen_host: "0.0.0.0"
listen_port: 8000

smtp:
  host: "smtp.example.com"
  port: 587
  username: "alert@example.com"
  password: "smtp-password"
  from_addr: "alert@example.com"
  to_addrs:
    - "user1@example.com"
  use_tls: true

monitor:
  probe_interval_sec: 30
  evaluation_interval_sec: 30
  default_tcp_timeout_sec: 3

database:
  path: "./monitor.db"

logging:
  level: "INFO"
  file: "./logs/server.log"
